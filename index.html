<!DOCTYPE html>
<html>
<head>
<title>Stroop Test</title>
<style>
body{
font-family:Arial;
text-align:center;
margin-top:120px;
}
#word{
font-size:64px;
margin-top:40px;
}
button{
font-size:20px;
padding:12px 25px;
margin-top:30px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="instructions">
<h2>Stroop Test</h2>

<p>Respond to the <b>INK COLOR</b>, not the word.</p>

<p>
R = Red<br>
G = Green<br>
B = Blue<br>
Y = Yellow
</p>

<p>Try to respond as quickly and accurately as possible.</p>

<button onclick="startTest()">Start Test</button>

</div>

<div id="word"></div>
<div id="results"></div>

<script>

const colors=["red","green","blue","yellow"]

let trials=[]
let data=[]
let index=0
let startTime

let congruentTrials=15
let incongruentTrials=15

function startTest(){

document.getElementById("instructions").style.display="none"

for(let i=0;i<congruentTrials;i++){
let c=colors[Math.floor(Math.random()*4)]
trials.push({word:c,color:c,type:"congruent"})
}

for(let i=0;i<incongruentTrials;i++){
let word=colors[Math.floor(Math.random()*4)]
let color=colors[Math.floor(Math.random()*4)]

while(word===color){
color=colors[Math.floor(Math.random()*4)]
}

trials.push({word:word,color:color,type:"incongruent"})
}

nextTrial()

}

function nextTrial(){

if(index>=trials.length){
finish()
return
}

let t=trials[index]

let el=document.getElementById("word")
el.innerText=t.word.toUpperCase()
el.style.color=t.color

startTime=performance.now()

setTimeout(()=>{
index++
nextTrial()
},2000)

}

document.addEventListener("keydown",function(e){

let key=e.key.toLowerCase()

let t=trials[index]

if(!t) return

let rt=performance.now()-startTime

let correct=false

if(
(key=="r" && t.color=="red") ||
(key=="g" && t.color=="green") ||
(key=="b" && t.color=="blue") ||
(key=="y" && t.color=="yellow")
){
correct=true
}

data.push({
type:t.type,
correct:correct,
rt:rt
})

})

function finish(){

let cong=[]
let incong=[]

data.forEach(d=>{
if(d.correct){
if(d.type=="congruent") cong.push(d.rt)
else incong.push(d.rt)
}
})

function avg(arr){
return arr.reduce((a,b)=>a+b,0)/arr.length
}

let mc=avg(cong)
let mi=avg(incong)

let diff=mi-mc

document.getElementById("word").innerText="Finished"

document.getElementById("results").innerHTML=
"Congruent mean RT: "+Math.round(mc)+" ms<br>"+
"Incongruent mean RT: "+Math.round(mi)+" ms<br>"+
"Stroop Effect: "+Math.round(diff)+" ms"

}

</script>

</body>
</html>
