<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Stroop Test</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      text-align:center;
      margin-top:90px;
    }
    #panel{
      max-width: 900px;
      margin: 0 auto;
      line-height: 1.45;
      font-size: 20px;
    }
    #stimulus{
      font-size: 72px;
      margin-top: 40px;
      height: 100px;
    }
    #fixation{
      font-size: 72px;
      margin-top: 40px;
      height: 100px;
      display:none;
    }
    button{
      font-size: 20px;
      padding: 12px 26px;
      margin-top: 26px;
      cursor: pointer;
    }
    .small{
      font-size: 16px;
      opacity: 0.85;
      margin-top: 12px;
    }
  </style>
</head>

<body>
  <div id="panel"></div>
  <div id="fixation">+</div>
  <div id="stimulus"></div>

<script>
  // -----------------------------
  // CONFIG
  // -----------------------------
  const COLORS = ["red","green","blue","yellow"];
  const TRIALS_CONG = 15;
  const TRIALS_INCONG = 15;

  const TRIAL_MS = 2000;      // fixed trial length
  const FIX_MS = 300;         // fixation duration
  const STIM_MS = TRIAL_MS - FIX_MS; // stimulus window inside trial

  // -----------------------------
  // STATE
  // -----------------------------
  const panelEl = document.getElementById("panel");
  const fixationEl = document.getElementById("fixation");
  const stimulusEl = document.getElementById("stimulus");

  let trials = [];
  let phase = "instructions"; // instructions | running | transition | finished
  let block = "congruent";    // congruent | incongruent
  let index = 0;

  let trialStartAbs = 0;      // absolute schedule anchor
  let stimOnsetTime = 0;      // time when stimulus appears (for RT)
  let responseAllowed = false;
  let respondedThisTrial = false;

  // store all keypress events as trial rows (one row per trial max)
  const data = [];

  // -----------------------------
  // HELPERS
  // -----------------------------
  function randInt(n){ return Math.floor(Math.random()*n); }

  function makeTrials(){
    const t = [];

    // 15 congruent first
    for(let i=0;i<TRIALS_CONG;i++){
      const c = COLORS[randInt(4)];
      t.push({type:"congruent", word:c, ink:c});
    }

    // 15 incongruent second
    for(let i=0;i<TRIALS_INCONG;i++){
      const w = COLORS[randInt(4)];
      let ink = COLORS[randInt(4)];
      while(ink === w){
        ink = COLORS[randInt(4)];
      }
      t.push({type:"incongruent", word:w, ink:ink});
    }

    return t;
  }

  function keyToColor(k){
    if(k === "r") return "red";
    if(k === "g") return "green";
    if(k === "b") return "blue";
    if(k === "y") return "yellow";
    return null;
  }

  function showInstructions(){
    phase = "instructions";
    fixationEl.style.display = "none";
    stimulusEl.innerText = "";
    panelEl.innerHTML = `
      <h2>Stroop Test</h2>
      <div>Respond to the <b>INK COLOR</b>, not the word.</div>
      <div class="small">Keys: R = Red, G = Green, B = Blue, Y = Yellow</div>
      <div class="small">Try to be as fast and accurate as you can.</div>
      <button id="startBtn">Start</button>
    `;
    document.getElementById("startBtn").onclick = startExperiment;
  }

  function showTransition(){
    phase = "transition";
    fixationEl.style.display = "none";
    stimulusEl.innerText = "";
    panelEl.innerHTML = `
      <h2>Section complete</h2>
      <div>You finished the congruent trials.</div>
      <div class="small">Next is the incongruent section. It may feel harder.</div>
      <div class="small"><b>Press any key to continue.</b></div>
    `;
  }

  function startExperiment(){
    trials = makeTrials();
    data.length = 0;

    block = "congruent";
    index = 0;
    phase = "running";

    panelEl.innerHTML = "";
    stimulusEl.innerText = "";
    fixationEl.style.display = "none";

    // Anchor the schedule so trials are spaced exactly TRIAL_MS apart
    trialStartAbs = performance.now() + 250; // tiny buffer so it feels smooth
    runTrialAtIndex(0);
  }

  function runTrialAtIndex(i){
    if(phase !== "running") return;

    // Check if we reached the transition point (after 15 congruent)
    if(i === TRIALS_CONG && block === "congruent"){
      block = "incongruent";
      showTransition();
      return;
    }

    // End after all trials
    if(i >= trials.length){
      finish();
      return;
    }

    index = i;

    // Absolute scheduled start time for this trial
    const scheduledStart = trialStartAbs + i * TRIAL_MS;

    // Correct drift: start exactly at scheduledStart
    const now = performance.now();
    const delayToStart = Math.max(0, scheduledStart - now);

    setTimeout(() => {
      startOneTrial(i, scheduledStart);
    }, delayToStart);
  }

  function startOneTrial(i, scheduledStart){
    if(phase !== "running") return;

    respondedThisTrial = false;
    responseAllowed = false;

    // Fixation
    panelEl.innerHTML = "";
    stimulusEl.innerText = "";
    fixationEl.style.display = "block";

    // Stimulus onset after FIX_MS
    setTimeout(() => {
      fixationEl.style.display = "none";

      const t = trials[i];
      stimulusEl.innerText = t.word.toUpperCase();
      stimulusEl.style.color = t.ink;

      stimOnsetTime = performance.now();
      responseAllowed = true;

      // End stimulus window at FIX_MS + STIM_MS = 2000ms from trial start
      setTimeout(() => {
        responseAllowed = false;
        stimulusEl.innerText = "";
      }, STIM_MS);

    }, FIX_MS);

    // Move to next trial exactly at scheduledStart + TRIAL_MS using absolute schedule
    const nextIndex = i + 1;
    const nextScheduled = trialStartAbs + nextIndex * TRIAL_MS;
    const delayToNext = Math.max(0, nextScheduled - performance.now());

    setTimeout(() => {
      runTrialAtIndex(nextIndex);
    }, delayToNext);
  }

  function finish(){
    phase = "finished";
    fixationEl.style.display = "none";
    stimulusEl.style.color = "black";
    stimulusEl.innerText = "Finished";

    // Compute means using correct trials only
    const congRT = [];
    const incongRT = [];

    let congTotal = 0, congCorrect = 0;
    let incongTotal = 0, incongCorrect = 0;

    for(const row of data){
      if(row.type === "congruent"){
        congTotal++;
        if(row.correct === 1){
          congCorrect++;
          congRT.push(row.rt);
        }
      } else {
        incongTotal++;
        if(row.correct === 1){
          incongCorrect++;
          incongRT.push(row.rt);
        }
      }
    }

    function mean(arr){
      if(arr.length === 0) return NaN;
      return arr.reduce((a,b)=>a+b,0)/arr.length;
    }

    const mc = mean(congRT);
    const mi = mean(incongRT);
    const diff = mi - mc;

    const accCon = congTotal ? Math.round(100*congCorrect/congTotal) : 0;
    const accInc = incongTotal ? Math.round(100*incongCorrect/incongTotal) : 0;

    const mcText = Number.isFinite(mc) ? `${Math.round(mc)} ms` : "Not enough correct trials";
    const miText = Number.isFinite(mi) ? `${Math.round(mi)} ms` : "Not enough correct trials";
    const dfText = Number.isFinite(diff) ? `${Math.round(diff)} ms` : "Not available";

    panelEl.innerHTML = `
      <h2>Results</h2>
      <div>Congruent mean RT (correct only): <b>${mcText}</b></div>
      <div>Incongruent mean RT (correct only): <b>${miText}</b></div>
      <div>Stroop difference (Inc - Con): <b>${dfText}</b></div>
      <div class="small" style="margin-top:14px;">
        Accuracy: Congruent ${accCon}%, Incongruent ${accInc}%
      </div>
      <div class="small">
        Note: If someone answers incorrectly, that trial is not used in the mean RT.
      </div>
    `;
  }

  // -----------------------------
  // INPUT HANDLING
  // -----------------------------
  document.addEventListener("keydown", (e) => {
    const key = e.key.toLowerCase();

    // Transition: any key continues
    if(phase === "transition"){
      phase = "running";
      panelEl.innerHTML = "";
      stimulusEl.innerText = "";
      fixationEl.style.display = "none";

      // Continue at the current index (which should be 15)
      runTrialAtIndex(TRIALS_CONG);
      return;
    }

    // During trials: accept one response per trial (r/g/b/y)
    if(phase !== "running") return;
    if(!responseAllowed) return;
    if(respondedThisTrial) return;

    const chosen = keyToColor(key);
    if(!chosen) return;

    respondedThisTrial = true;

    const t = trials[index];
    const rt = performance.now() - stimOnsetTime;
    const correct = (chosen === t.ink) ? 1 : 0;

    data.push({
      trial: index + 1,
      type: t.type,
      word: t.word,
      ink: t.ink,
      key: key,
      correct: correct,
      rt: Math.round(rt)
    });
  });

  // -----------------------------
  // INIT
  // -----------------------------
  showInstructions();
</script>

</body>
</html>
