<!DOCTYPE html>
<html>
<head>
<title>Stroop Test</title>
<style>
body{
font-family:Arial;
text-align:center;
margin-top:100px;
}
#word{
font-size:70px;
margin-top:40px;
}
#fix{
font-size:70px;
margin-top:40px;
display:none;
}
button{
font-size:20px;
padding:12px 25px;
margin-top:25px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="instructions">
<h2>Stroop Test</h2>

<p>Respond to the <b>INK COLOR</b>, not the word.</p>

<p>
Press the following keys on your keyboard:<br>
R = Red<br>
G = Green<br>
B = Blue<br>
Y = Yellow
</p>

<button onclick="startTest()">Start Test</button>
</div>

<div id="fix">+</div>
<div id="word"></div>
<div id="results"></div>

<script>

const colors=["red","green","blue","yellow"]

let trials=[]
let data=[]
let index=0

let trialStart
let trialTimer

let fixationTime=100
let maxTrialTime=1000

function startTest(){

document.getElementById("instructions").style.display="none"

for(let i=0;i<15;i++){
let c=colors[Math.floor(Math.random()*4)]
trials.push({word:c,color:c,type:"congruent"})
}

for(let i=0;i<15;i++){
let w=colors[Math.floor(Math.random()*4)]
let c=colors[Math.floor(Math.random()*4)]
while(w===c){c=colors[Math.floor(Math.random()*4)]}
trials.push({word:w,color:c,type:"incongruent"})
}

nextTrial()

}

function nextTrial(){

if(index>=trials.length){
finish()
return
}

document.getElementById("word").innerText=""
document.getElementById("fix").style.display="block"

setTimeout(showStimulus,fixationTime)

}

function showStimulus(){

let t=trials[index]

document.getElementById("fix").style.display="none"

let el=document.getElementById("word")
el.innerText=t.word.toUpperCase()
el.style.color=t.color

trialStart=performance.now()

trialTimer=setTimeout(()=>{
index++
nextTrial()
},maxTrialTime-fixationTime)

}

document.addEventListener("keydown",function(e){

let key=e.key.toLowerCase()
let t=trials[index]

if(!t) return

let rt=performance.now()-trialStart

let correct=false

if(
(key=="r" && t.color=="red") ||
(key=="g" && t.color=="green") ||
(key=="b" && t.color=="blue") ||
(key=="y" && t.color=="yellow")
){
correct=true
}

data.push({
type:t.type,
correct:correct,
rt:rt
})

if(correct){
clearTimeout(trialTimer)
index++
nextTrial()
}

})

function finish(){

let cong=[]
let incong=[]

data.forEach(d=>{
if(d.correct){
if(d.type=="congruent") cong.push(d.rt)
else incong.push(d.rt)
}
})

function avg(a){return a.reduce((x,y)=>x+y,0)/a.length}

let mc=avg(cong)
let mi=avg(incong)

let diff=mi-mc

document.getElementById("word").innerText="Finished"

document.getElementById("results").innerHTML=
"Congruent mean RT: "+Math.round(mc)+" ms<br>"+
"Incongruent mean RT: "+Math.round(mi)+" ms<br>"+
"Stroop Effect: "+Math.round(diff)+" ms"

}

</script>

</body>
</html>
