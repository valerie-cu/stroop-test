<!DOCTYPE html>
<html>
<head>
<title>Stroop Test</title>
<style>
body{
font-family:Arial;
text-align:center;
margin-top:100px;
}
#word{
font-size:70px;
margin-top:40px;
min-height:90px;
}
#fix{
font-size:70px;
margin-top:40px;
display:none;
min-height:90px;
}
button{
font-size:20px;
padding:12px 25px;
margin-top:25px;
cursor:pointer;
}
.small{
font-size:16px;
opacity:0.85;
max-width:900px;
margin:0 auto;
line-height:1.4;
}
</style>
</head>

<body>

<div id="instructions">
<h2>Stroop Test</h2>

<p class="small">
Respond to the <b>INK COLOR</b>, not the word itself.<br>
For example, if the word <b>RED</b> is shown in <span style="color:blue;"><b>blue</b></span>, press <b>B</b>.
</p>

<p class="small"><b>Press the following keys on your keyboard:</b></p>

<p class="small">
R = Red<br>
G = Green<br>
B = Blue<br>
Y = Yellow
</p>

<p class="small">
Try to respond as quickly and accurately as possible. Each word appears briefly.
</p>

<button onclick="startTest()">Start Test</button>
</div>

<div id="stage" class="small"></div>
<div id="fix">+</div>
<div id="word"></div>
<div id="results" class="small"></div>

<script>

const colors=["red","green","blue","yellow"]

let trials=[]
let data=[]
let index=0

let trialStart=0
let trialTimer=null

let fixationTime=200
let maxTrialTime=1000

let respondedThisTrial=false
let waitingForStageStart=false

const stageEl=document.getElementById("stage")
const instructionsEl=document.getElementById("instructions")
const fixEl=document.getElementById("fix")
const wordEl=document.getElementById("word")
const resultsEl=document.getElementById("results")

function startTest(){

instructionsEl.style.display="none"
resultsEl.innerHTML=""
stageEl.innerHTML=""

trials=[]
data=[]
index=0

// Build 15 congruent first
for(let i=0;i<15;i++){
let c=colors[Math.floor(Math.random()*4)]
trials.push({word:c,color:c,type:"congruent"})
}

// Then 15 incongruent
for(let i=0;i<15;i++){
let w=colors[Math.floor(Math.random()*4)]
let c=colors[Math.floor(Math.random()*4)]
while(w===c){c=colors[Math.floor(Math.random()*4)]}
trials.push({word:w,color:c,type:"incongruent"})
}

stageEl.innerHTML="<b>Stage 1:</b> Congruent"
nextTrial()
}

function nextTrial(){

// Stage break right after the 15th trial (index 15 means congruent finished)
if(index===15 && !waitingForStageStart){
pauseForIncongruentStart()
return
}

if(index>=trials.length){
finish()
return
}

respondedThisTrial=false

wordEl.innerText=""
fixEl.style.display="block"

setTimeout(showStimulus,fixationTime)
}

function pauseForIncongruentStart(){

waitingForStageStart=true

// Clear anything on screen
if(trialTimer) clearTimeout(trialTimer)
wordEl.innerText=""
fixEl.style.display="none"

stageEl.innerHTML=
"<b>Stage 1 complete.</b><br><br>" +
"<b>Stage 2:</b> Incongruent (harder).<br>" +
"Press any key to begin."

}

function showStimulus(){

let t=trials[index]

fixEl.style.display="none"

stageEl.innerHTML = (index < 15) ? "<b>Stage 1:</b> Congruent" : "<b>Stage 2:</b> Incongruent"

wordEl.innerText=t.word.toUpperCase()
wordEl.style.color=t.color

trialStart=performance.now()

trialTimer=setTimeout(()=>{
index++
nextTrial()
},maxTrialTime-fixationTime)
}

function keyMatchesAllowed(key){
return key==="r" || key==="g" || key==="b" || key==="y"
}

document.addEventListener("keydown",function(e){

let key=e.key.toLowerCase()

// Handle stage 2 "press any key to begin"
if(waitingForStageStart){
waitingForStageStart=false
stageEl.innerHTML=""
nextTrial()
return
}

// Do nothing if task not started yet
if(instructionsEl.style.display !== "none") return

// If already responded this trial, ignore extra keys
if(respondedThisTrial) return

// Only accept r/g/b/y
if(!keyMatchesAllowed(key)) return

let t=trials[index]
if(!t) return

respondedThisTrial=true

let rt=performance.now()-trialStart

let correct=false
if(
(key=="r" && t.color=="red") ||
(key=="g" && t.color=="green") ||
(key=="b" && t.color=="blue") ||
(key=="y" && t.color=="yellow")
){
correct=true
}

data.push({
type:t.type,
correct:correct,
rt:rt
})

// Move on immediately for BOTH correct and incorrect
clearTimeout(trialTimer)
index++
nextTrial()

})

function finish(){

wordEl.style.color="black"
wordEl.innerText="Finished"
fixEl.style.display="none"
stageEl.innerHTML=""

let cong=[]
let incong=[]
let congN=0, incongN=0
let congC=0, incongC=0

data.forEach(d=>{
if(d.type==="congruent"){
congN++
if(d.correct){congC++; cong.push(d.rt)}
}else{
incongN++
if(d.correct){incongC++; incong.push(d.rt)}
}
})

function avg(a){
if(a.length===0) return NaN
return a.reduce((x,y)=>x+y,0)/a.length
}

let mc=avg(cong)
let mi=avg(incong)
let diff=mi-mc

let accCon = congN ? Math.round(100*congC/congN) : 0
let accInc = incongN ? Math.round(100*incongC/incongN) : 0

let mcText = Number.isFinite(mc) ? Math.round(mc)+" ms" : "Not enough correct trials"
let miText = Number.isFinite(mi) ? Math.round(mi)+" ms" : "Not enough correct trials"
let diffText = Number.isFinite(diff) ? Math.round(diff)+" ms" : "Not available"

resultsEl.innerHTML=
"<b>Congruent mean RT (correct only):</b> "+mcText+"<br>"+
"<b>Incongruent mean RT (correct only):</b> "+miText+"<br>"+
"<b>Stroop Effect (Inc - Con):</b> "+diffText+"<br><br>"+
"Accuracy: Congruent "+accCon+"%, Incongruent "+accInc+"%"

}

</script>

</body>
</html>
