<!DOCTYPE html>
<html>
<head>
<title>Stroop Test</title>
<style>
body{
font-family:Arial;
text-align:center;
margin-top:100px;
}
#word{
font-size:70px;
margin-top:40px;
min-height:90px;
}
#fix{
font-size:70px;
margin-top:40px;
display:none;
min-height:90px;
}
button{
font-size:20px;
padding:12px 25px;
margin-top:25px;
cursor:pointer;
}
.small{
font-size:16px;
opacity:0.9;
max-width:900px;
margin:0 auto;
line-height:1.45;
}
#stage{
min-height:60px;
}
</style>
</head>

<body>

<div id="instructions">
  <h2>Stroop Test</h2>

  <p class="small">
    Respond to the <b>INK COLOR</b>, not the word itself.<br>
    Example: if <b>RED</b> is shown in <span style="color:blue;"><b>blue</b></span>, press <b>B</b>.
  </p>

  <p class="small"><b>Press the following keys:</b></p>

  <p class="small">
    R = Red<br>
    G = Green<br>
    B = Blue<br>
    Y = Yellow
  </p>

  <p class="small">
    Each trial lasts <b>2 seconds</b>. Try to be as fast and accurate as you can.
  </p>

  <button id="startBtn">Start Test</button>
</div>

<div id="stage" class="small"></div>
<div id="fix">+</div>
<div id="word"></div>
<div id="results" class="small"></div>

<script>
const colors = ["red","green","blue","yellow"];

const TRIAL_MS = 2000;
const FIX_MS = 200;
const STIM_MS = TRIAL_MS - FIX_MS;

const TRIALS_CONG = 15;
const TRIALS_INCONG = 15;

let trials = [];
let data = [];
let index = 0;

let trialStartTime = 0;     // when the stimulus appears (for RT)
let allowResponse = false;
let respondedThisTrial = false;

let trialTimer = null;
let stimTimer = null;
let fixTimer = null;

let phase = "instructions"; // instructions | stage1 | break | stage2 | finished

const instructionsEl = document.getElementById("instructions");
const stageEl = document.getElementById("stage");
const fixEl = document.getElementById("fix");
const wordEl = document.getElementById("word");
const resultsEl = document.getElementById("results");

function randColor(){
return colors[Math.floor(Math.random()*4)];
}

function buildTrials(){
const t = [];

// congruent first
for(let i=0;i<TRIALS_CONG;i++){
const c = randColor();
t.push({word:c, ink:c, type:"congruent"});
}

// incongruent second
for(let i=0;i<TRIALS_INCONG;i++){
const w = randColor();
let ink = randColor();
while(ink === w) ink = randColor();
t.push({word:w, ink:ink, type:"incongruent"});
}

return t;
}

function showInstructions(){
phase = "instructions";
stageEl.innerHTML = "";
wordEl.innerText = "";
fixEl.style.display = "none";
resultsEl.innerHTML = "";
instructionsEl.style.display = "block";
}

function startTest(){
instructionsEl.style.display = "none";
resultsEl.innerHTML = "";
trials = buildTrials();
data = [];
index = 0;
phase = "stage1";
stageEl.innerHTML = "<b>Stage 1:</b> Congruent";
nextTrial();
}

function showBreak(){
phase = "break";
allowResponse = false;
respondedThisTrial = false;

stageEl.innerHTML =
"<b>Stage 1 complete.</b><br>" +
"<b>Stage 2:</b> Incongruent (harder).<br>" +
"Press any key to begin, or click Continue.<br>" +
"<button id='continueBtn'>Continue</button>";

wordEl.innerText = "";
fixEl.style.display = "none";

document.getElementById("continueBtn").onclick = () => {
startStage2();
};
}

function startStage2(){
phase = "stage2";
stageEl.innerHTML = "<b>Stage 2:</b> Incongruent";
nextTrial();
}

function clearTimers(){
if(trialTimer) clearTimeout(trialTimer);
if(stimTimer) clearTimeout(stimTimer);
if(fixTimer) clearTimeout(fixTimer);
trialTimer = null;
stimTimer = null;
fixTimer = null;
}

function nextTrial(){

// stage transition after congruent trials
if(index === TRIALS_CONG && phase !== "break" && phase !== "stage2"){
clearTimers();
showBreak();
return;
}

// finished
if(index >= trials.length){
finish();
return;
}

respondedThisTrial = false;
allowResponse = false;

wordEl.innerText = "";
fixEl.style.display = "block";

// Show fixation then stimulus
fixTimer = setTimeout(() => {
fixEl.style.display = "none";

const t = trials[index];
wordEl.innerText = t.word.toUpperCase();
wordEl.style.color = t.ink;

// stimulus onset for RT
trialStartTime = performance.now();
allowResponse = true;

// end stimulus window at FIX_MS + STIM_MS (= 2s from trial start)
stimTimer = setTimeout(() => {
allowResponse = false;
wordEl.innerText = "";
}, STIM_MS);

}, FIX_MS);

// End the trial exactly at 2000 ms from trial start (FIX_MS + STIM_MS)
trialTimer = setTimeout(() => {
allowResponse = false;
index++;
nextTrial();
}, TRIAL_MS);
}

function keyToInk(key){
if(key === "r") return "red";
if(key === "g") return "green";
if(key === "b") return "blue";
if(key === "y") return "yellow";
return null;
}

document.addEventListener("keydown", (e) => {
const key = e.key.toLowerCase();

// Break screen: any key continues
if(phase === "break"){
startStage2();
return;
}

// Only accept responses during the task
if(!(phase === "stage1" || phase === "stage2")) return;
if(!allowResponse) return;
if(respondedThisTrial) return;

const chosenInk = keyToInk(key);
if(!chosenInk) return;

respondedThisTrial = true;

const t = trials[index];
const rt = performance.now() - trialStartTime;
const correct = (chosenInk === t.ink);

data.push({
trial: index + 1,
type: t.type,
word: t.word,
ink: t.ink,
key: key,
correct: correct ? 1 : 0,
rt: Math.round(rt)
});

// IMPORTANT: do NOT advance here.
// Trial ends on the fixed 2-second schedule.
});

function finish(){
phase = "finished";
clearTimers();

fixEl.style.display = "none";
wordEl.style.color = "black";
wordEl.innerText = "Finished";
stageEl.innerHTML = "";

const congRT = [];
const incongRT = [];
let congN=0, congC=0, incN=0, incC=0;

for(const d of data){
if(d.type === "congruent"){
congN++;
if(d.correct){ congC++; congRT.push(d.rt); }
} else {
incN++;
if(d.correct){ incC++; incongRT.push(d.rt); }
}
}

function mean(arr){
if(arr.length === 0) return NaN;
return arr.reduce((a,b)=>a+b,0)/arr.length;
}

const mc = mean(congRT);
const mi = mean(incongRT);
const diff = mi - mc;

const accCon = congN ? Math.round(100*congC/congN) : 0;
const accInc = incN ? Math.round(100*incC/incN) : 0;

const mcText = Number.isFinite(mc) ? `${Math.round(mc)} ms` : "Not enough correct trials";
const miText = Number.isFinite(mi) ? `${Math.round(mi)} ms` : "Not enough correct trials";
const dfText = Number.isFinite(diff) ? `${Math.round(diff)} ms` : "Not available";

resultsEl.innerHTML =
"<b>Congruent mean RT (correct only):</b> " + mcText + "<br>" +
"<b>Incongruent mean RT (correct only):</b> " + miText + "<br>" +
"<b>Stroop Effect (Inc - Con):</b> " + dfText + "<br><br>" +
"Accuracy: Congruent " + accCon + "%, Incongruent " + accInc + "%";
}

document.getElementById("startBtn").onclick = startTest;

// initial
showInstructions();
</script>

</body>
</html>
